<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Advice Drop Box — FBC Quarterly</title>
<style>
  :root {
    --bg: #ffffff;
    --ink: #000000;
    --muted: #888888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "Times New Roman", Times, serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  main {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 28px;
  }

  .sheet {
    width: 100%;
    max-width: 440px;
    text-align: center;
  }

  .logo {
    display: block;
    width: 180px;
    height: auto;
    margin: 0 auto 28px;
  }

  h1 {
    font-family: "Times New Roman", Times, serif;
    font-weight: 400;
    font-style: normal;
    font-size: 38px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 18px;
  }

  .dek {
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 40px;
    color: var(--ink);
  }

  form {
    text-align: left;
  }

  .field { margin-bottom: 22px; }

  label.field-label {
    display: block;
    font-size: 14px;
    font-style: normal;
    color: var(--muted);
    margin-bottom: 8px;
  }

  textarea, input[type="email"], input[type="text"] {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ink);
    padding: 6px 0;
    font-family: "Times New Roman", Times, serif;
    font-size: 17px;
    color: var(--ink);
    resize: none;
    outline: none;
    border-radius: 0;
  }

  textarea { min-height: 120px; line-height: 1.5; }

  textarea::placeholder, input::placeholder {
    color: var(--muted);
    font-style: italic;
  }

  /* custom radio buttons */
  .radios {
    display: flex;
    gap: 28px;
    padding: 2px 0;
  }

  .radio {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    cursor: pointer;
    font-size: 17px;
    font-style: normal;
    user-select: none;
  }

  .radio input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .radio .dot {
    width: 14px;
    height: 14px;
    border: 1px solid var(--ink);
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
    transition: background 150ms ease;
  }

  .radio input:checked + .dot::after {
    content: "";
    position: absolute;
    top: 3px; left: 3px;
    width: 6px; height: 6px;
    background: var(--ink);
    border-radius: 50%;
  }

  .radio input:focus-visible + .dot {
    outline: 1px solid var(--ink);
    outline-offset: 2px;
  }

  .actions {
    margin-top: 32px;
    text-align: center;
  }

  button {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 10px 28px;
    font-family: "Times New Roman", Times, serif;
    font-size: 16px;
    font-style: normal;
    cursor: pointer;
    border-radius: 0;
    transition: background 150ms ease, color 150ms ease;
  }

  button:hover:not(:disabled) {
    background: var(--ink);
    color: var(--bg);
  }

  button:disabled { opacity: 0.4; cursor: wait; }

  .status {
    min-height: 20px;
    margin-top: 18px;
    font-size: 14px;
    font-style: normal;
    text-align: center;
    color: var(--muted);
    opacity: 0;
    transition: opacity 250ms ease;
  }
  .status.show { opacity: 1; }

  .thanks { display: none; }
  .thanks.show { display: block; }

  .thanks p {
    font-style: italic;
    font-size: 22px;
    line-height: 1.4;
    margin-bottom: 24px;
  }

  .again {
    display: inline-block;
    font-family: "Times New Roman", Times, serif;
    font-size: 16px;
    font-style: italic;
    color: var(--ink);
    text-decoration: underline;
    text-underline-offset: 3px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }

  .again:hover { color: var(--muted); }

  @media (max-width: 480px) {
    h1 { font-size: 32px; }
    main { padding: 48px 22px; }
    .logo { width: 150px; }
  }
</style>
</head>
<body>
  <main>
    <div class="sheet">

      <div id="form-view">
        <img src="logo_FBCQ.jpg" alt="FBC Quarterly" class="logo" />
        <h1>Advice Drop Box</h1>
        <p class="dek">Anonymous submissions for the next issue of FBC Quarterly.</p>

        <form id="secret-form">
          <div class="field">
            <span class="field-label">Type of advice</span>
            <div class="radios">
              <label class="radio">
                <input type="radio" name="category" value="Life" required checked />
                <span class="dot"></span>
                <span>Life</span>
              </label>
              <label class="radio">
                <input type="radio" name="category" value="Medical" />
                <span class="dot"></span>
                <span>Medical</span>
              </label>
            </div>
          </div>

          <div class="field">
            <label class="field-label" for="secret">What is bothering you?</label>
            <textarea id="secret" name="secret" required maxlength="5000" placeholder="…"></textarea>
          </div>

          <div class="field">
            <label class="field-label" for="pseudonym">Pseudonym — optional</label>
            <input type="text" id="pseudonym" name="pseudonym" maxlength="60" placeholder="…" />
          </div>

          <div class="field">
            <label class="field-label" for="email">Email — optional, for a printed copy</label>
            <input type="email" id="email" name="email" placeholder="…" />
          </div>

          <div class="actions">
            <button type="submit" id="submit-btn">Drop it</button>
          </div>
        </form>

        <div class="status" id="status"></div>
      </div>

      <div class="thanks" id="thanks-view">
        <img src="logo_FBCQ.jpg" alt="FBC Quarterly" class="logo" />
        <p>Thank you. Your advice is in the box.</p>
        <button type="button" class="again" id="again-btn">Submit another request for advice →</button>
      </div>

    </div>
  </main>

  <script>

    const FORMSPREE_ENDPOINT = "https://formspree.io/f/xpqkoqvb";
    const form = document.getElementById("secret-form");
    const btn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");
    const formView = document.getElementById("form-view");
    const thanksView = document.getElementById("thanks-view");
    const againBtn = document.getElementById("again-btn");

    againBtn.addEventListener("click", () => {
      form.reset();
      // re-check the default radio
      document.querySelector('input[name="category"][value="Life"]').checked = true;
      btn.disabled = false;
      btn.textContent = "Drop it";
      statusEl.classList.remove("show");
      thanksView.classList.remove("show");
      formView.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const secret = document.getElementById("secret").value.trim();
      const email = document.getElementById("email").value.trim();
      const pseudonym = document.getElementById("pseudonym").value.trim();
      const category = document.querySelector('input[name="category"]:checked')?.value || "Life";
      if (!secret) return;

      btn.disabled = true;
      btn.textContent = "Sending…";
      statusEl.classList.remove("show");

      try {
        const res = await fetch(FORMSPREE_ENDPOINT, {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/json" },
          body: JSON.stringify({
            category: category,
            pseudonym: pseudonym || "(anonymous)",
            advice: secret,
            subscriber_email: email || "(not provided)",
            _subject: `New ${category.toLowerCase()} advice for FBC Quarterly`
          })
        });

        if (res.ok) {
          formView.style.display = "none";
          thanksView.classList.add("show");
        } else {
          throw new Error("Submission failed");
        }
      } catch (err) {
        statusEl.textContent = "Something went wrong. Try again.";
        statusEl.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Drop it";
      }
    });
  </script>
</body>
</html>
