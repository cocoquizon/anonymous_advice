<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Advice Drop Box</title>
<style>
  :root {
    --bg: #ffffff;
    --ink: #000000;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Times New Roman", Times, serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
 
  main {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 36px 32px;
  }
 
  .sheet {
    width: 100%;
    max-width: 640px;
    text-align: center;
  }
 
  .dek {
    font-size: 17px;
    color: var(--ink);
    margin-bottom: 28px;
  }
 
  form { text-align: left; }
 
  .field { margin-bottom: 20px; }
 
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .row .field { margin-bottom: 0; }
 
  .label {
    display: block;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 6px;
  }
 
  textarea, input[type="email"], input[type="text"] {
    width: 100%;
    background: transparent;
    border: 1px solid var(--ink);
    padding: 10px 12px;
    font-family: "Times New Roman", Times, serif;
    font-size: 17px;
    color: var(--ink);
    resize: none;
    outline: none;
    border-radius: 0;
  }
 
  textarea { min-height: 130px; line-height: 1.5; }
 
  textarea::placeholder, input::placeholder {
    color: var(--ink);
    opacity: 1;
  }
 
  textarea:focus, input:focus {
    outline: 1px solid var(--ink);
    outline-offset: -2px;
  }
 
  .radios {
    display: flex;
    gap: 28px;
    padding: 2px 0;
  }
 
  .radio {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    cursor: pointer;
    font-size: 17px;
    user-select: none;
    position: relative;
  }
 
  .radio input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
 
  .radio .dot {
    width: 14px;
    height: 14px;
    border: 1px solid var(--ink);
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
  }
 
  .radio input:checked + .dot::after {
    content: "";
    position: absolute;
    top: 3px; left: 3px;
    width: 6px; height: 6px;
    background: var(--ink);
    border-radius: 50%;
  }
 
  .actions {
    margin-top: 24px;
    text-align: center;
  }
 
  button {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 10px 32px;
    font-family: "Times New Roman", Times, serif;
    font-size: 16px;
    cursor: pointer;
    border-radius: 0;
    transition: background 150ms ease, color 150ms ease;
  }
 
  button:hover:not(:disabled) {
    background: var(--ink);
    color: var(--bg);
  }
 
  button:disabled { opacity: 0.4; cursor: wait; }
 
  .status {
    min-height: 20px;
    margin-top: 14px;
    font-size: 14px;
    text-align: center;
    color: var(--ink);
    opacity: 0;
    transition: opacity 250ms ease;
  }
  .status.show { opacity: 1; }
 
  .thanks { display: none; padding: 24px 0; }
  .thanks.show { display: block; }
 
  .thanks p {
    font-size: 22px;
    line-height: 1.4;
    margin-bottom: 20px;
  }
 
  .again {
    display: inline-block;
    font-family: "Times New Roman", Times, serif;
    font-size: 16px;
    color: var(--ink);
    text-decoration: underline;
    text-underline-offset: 3px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }
 
  .again:hover { text-decoration: none; }
 
  @media (max-width: 560px) {
    main { padding: 28px 22px; }
    .row { grid-template-columns: 1fr; gap: 0; margin-bottom: 0; }
    .row .field { margin-bottom: 20px; }
  }
</style>
</head>
<body>
  <main>
    <div class="sheet">
 
      <div id="form-view">
        <p class="dek">Anonymous submissions for the next issue of FBC Quarterly.</p>
 
        <form id="secret-form">
          <div class="field">
            <span class="label">Type of advice</span>
            <div class="radios">
              <label class="radio">
                <input type="radio" name="category" value="Life" required checked />
                <span class="dot"></span>
                <span>Life</span>
              </label>
              <label class="radio">
                <input type="radio" name="category" value="Medical" />
                <span class="dot"></span>
                <span>Medical</span>
              </label>
            </div>
          </div>
 
          <div class="field">
            <label class="label" for="secret">What ails you?</label>
            <textarea id="secret" name="secret" required maxlength="5000" placeholder="…"></textarea>
          </div>
 
          <div class="row">
            <div class="field">
              <label class="label" for="pseudonym">Pseudonym — optional</label>
              <input type="text" id="pseudonym" name="pseudonym" maxlength="60" placeholder="…" />
            </div>
            <div class="field">
              <label class="label" for="email">Email — optional, for a printed copy if selected</label>
              <input type="email" id="email" name="email" placeholder="…" />
            </div>
          </div>
 
          <div class="actions">
            <button type="submit" id="submit-btn">Submit</button>
          </div>
        </form>
 
        <div class="status" id="status"></div>
      </div>
 
      <div class="thanks" id="thanks-view">
        <p>Thank you. Your advice is in the box.</p>
        <button type="button" class="again" id="again-btn">Submit another request for advice →</button>
      </div>
 
    </div>
  </main>
 
  <script>
    const FORMSPREE_ENDPOINT = "https://formspree.io/f/xpqkoqvb";
    const form = document.getElementById("secret-form");
    const btn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");
    const formView = document.getElementById("form-view");
    const thanksView = document.getElementById("thanks-view");
    const againBtn = document.getElementById("again-btn");
 
    againBtn.addEventListener("click", () => {
      form.reset();
      document.querySelector('input[name="category"][value="Life"]').checked = true;
      btn.disabled = false;
      btn.textContent = "Submit";
      statusEl.classList.remove("show");
      thanksView.classList.remove("show");
      formView.style.display = "block";
    });
 
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
 
      const secret = document.getElementById("secret").value.trim();
      const email = document.getElementById("email").value.trim();
      const pseudonym = document.getElementById("pseudonym").value.trim();
      const category = document.querySelector('input[name="category"]:checked')?.value || "Life";
      if (!secret) return;
 
      btn.disabled = true;
      btn.textContent = "Sending…";
      statusEl.classList.remove("show");
 
      try {
        const res = await fetch(FORMSPREE_ENDPOINT, {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/json" },
          body: JSON.stringify({
            category: category,
            pseudonym: pseudonym || "(anonymous)",
            advice: secret,
            subscriber_email: email || "(not provided)",
            _subject: `New ${category.toLowerCase()} advice for FBC Quarterly`
          })
        });
 
        if (res.ok) {
          formView.style.display = "none";
          thanksView.classList.add("show");
        } else {
          throw new Error("Submission failed");
        }
      } catch (err) {
        statusEl.textContent = "Something went wrong. Try again.";
        statusEl.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Submit";
      }
    });
  </script>
</body>
</html>
